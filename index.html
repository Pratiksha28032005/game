<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #43cea2, #185a9d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        .btn-custom {
            margin: 5px;
        }
    </style>
</head>
<body>

<div class="game-card">
    <h3>✊ Rock Paper Scissors</h3>

    <p>Choose your move:</p>

    <button class="btn btn-primary btn-custom" onclick="play('rock')">✊ Rock</button>
    <button class="btn btn-success btn-custom" onclick="play('paper')">✋ Paper</button>
    <button class="btn btn-danger btn-custom" onclick="play('scissors')">✌️ Scissors</button>

    <p class="mt-3"><b>Your Choice:</b> <span id="userChoice">-</span></p>
    <p><b>Computer:</b> <span id="compChoice">-</span></p>

    <p id="result" class="fw-bold mt-2"></p>

    <p>Score: <span id="score">0</span></p>

    <button class="btn btn-secondary mt-2" onclick="resetGame()">Reset</button>
</div>

<script>
    let score = 0;
    const choices = ["rock", "paper", "scissors"];

    function play(user) {
        let computer = choices[Math.floor(Math.random() * 3)];

        document.getElementById("userChoice").innerText = user;
        document.getElementById("compChoice").innerText = computer;

        let resultText = "";

        if (user === computer) {
            resultText = "😐 It's a Draw!";
        } 
        else if (
            (user === "rock" && computer === "scissors") ||
            (user === "paper" && computer === "rock") ||
            (user === "scissors" && computer === "paper")
        ) {
            resultText = "🎉 You Win!";
            score++;
        } 
        else {
            resultText = "😢 You Lose!";
            score--;
        }

        document.getElementById("result").innerText = resultText;
        document.getElementById("score").innerText = score;
    }

    function resetGame() {
        score = 0;
        document.getElementById("score").innerText = 0;
        document.getElementById("userChoice").innerText = "-";
        document.getElementById("compChoice").innerText = "-";
        document.getElementById("result").innerText = "";
    }
</script>

</body>
</html>
